<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Online Banking System</title>
</head>

<body>
    <div class="container" id="container">
        <div class="form-container-sign-up-container">
            <button id="signup-btn-for-switch">Switch</button>
            <form action="#">
                <h1>Create Account</h1>
                <input type="text" placeholder="Last Name"> <br>
                <input type="text" placeholder="First Name"> <br>
                <input type="text" placeholder="Address"> <br>
                <input type="text" placeholder="Age"> <br>

                <label for="Gender">Gender</label> <br>
                <input type="radio" name="Gender" id="Gender" value="Male"> <label for="Gender">Male</label> <br>
                <input type="radio" name="Gender" id="Gender" value="Female"> <label for="Gender">Female</label> <br>
                <input type="radio" name="Gender" id="Gender" value="Others"> <label for="Gender">Other's</label> <br>

                <input type="text" placeholder="Username" id="username"> <br>
                <input type="password" placeholder="Password" id="password"> <br>

                <button id="sign-up" class="sign-up-btn">Sign Up</button>
            </form>
        </div>
        <div class="form-container-login-container">
            <button id="login-btn-for-switch">Login</button>
            <form action="#">
                <h1>Login Account</h1>
                <input type="text" placeholder="Username" id="username-login"> <br>
                <input type="password" placeholder="Password" id="password-login"> <br>

                <button id="login-btn" class="login-btn">Login</button>
            </form>
        </div>
    </div>

</html>
