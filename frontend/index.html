<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Online Banking System</title>
</head>

<body>
    <!--Login-->
    <div class="login-screen">
        <div class="login-card">
            <h1>WELCOME! <br> Kanje's Banking System <span>KBS</span></h1>
            <div class="signup-form">
                <h2>Sign-up Form</h2>
                <form>
                    <h3>Fill up the required information.</h3>
                    <label for="lastname">Last Name:</label> <br>
                    <input type="text" id="lastname" name="last Name"> <br>
                    <label for="firstname">First Name:</label> <br>
                    <input type="text" id="firstname" name="first Name"> <br>

                    <label for="address">Address:</label> <br>
                    <input type="text" id="address" name="Address"> <br>

                    <label for="age">Age:</label> <br>
                    <input type="text" id="age" name="Age"> <br>

                    <label for="gender">Gender:</label> <br>
                    <input type="radio" id="gender" name="Gender" value="Male"> <label for="Male">Male</label>
                    <input type="radio" id="gender" name="Gender" value="Female"> <label for="Female">Female</label>
                    <input type="radio" id="gender" name="Gender" value="Others"> <label for="Others">Other's</label>
                    <br>

                    <label for="username">Username:</label> <br>
                    <input type="text" id="username" name="Username"> <br>

                    <label for="password">Password:</label> <br>
                    <input type="password" id="password" name="Password"> <br>

                    <label for="confirmpass">Confirm Password:</label> <br>
                    <input type="password" name="ConfirmPassword" id="confirmpass"> <br>

                    <input type="button" value="submit"> <br>
                    <input type="button" value="Clear">

                    <label for="">Already have an account?</label>

                </form>
            </div>

            <div class="login-form">
                <h2>Login Form</h2>
                <form action="">
                    <label for="username">Username:</label> <br>
                    <input type="text" id="username" Name="Username"> <br>

                    <label for="password">Password:</label> <br>
                    <input type="password" name="Password" id="password"> <br>

                    <input type="radio" name="ShowPassword" id="showpassword" class="showpassword" value="showpassword">
                    <label for="showpassword">Show Password</label> <br>

                    <input type="button" value="login">
                </form>
            </div>
        </div>
    </div>
</body>

</html>
